name: Pipeline — Parallel web search (daily)

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -q psycopg2-binary python-dotenv requests parallel-web-tools

      - name: Authenticate Parallel CLI
        run: |
          mkdir -p ~/.config/parallel-web-tools
          printf '{"access_token":"%s"}' "${{ secrets.PARALLEL_ACCESS_TOKEN }}" \
            > ~/.config/parallel-web-tools/credentials.json

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python pipeline.py --source=parallel

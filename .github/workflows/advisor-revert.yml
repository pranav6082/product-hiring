name: Advisor — revert last change (manual)

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: monitor

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: 50

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -q requests

      - name: Configure git
        run: |
          git config --global user.name  "ai-advisor"
          git config --global user.email "ai@pipeline"

      - name: Revert last advisor change
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python ai_advisor.py --revert-last
